<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Reader Companion</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f8f9fa;
            color: #333;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        h2 { margin-top: 0; color: #222; }
        .form-group { margin-bottom: 15px; }
        input[type="file"] { display: block; margin-bottom: 15px; }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h1>Exteink X3 Companion App</h1>
    <p>Convert documents and optimize images for your e-ink display.</p>

    <div class="card">
        <h2>Document Converter</h2>
        <form action="/upload-text" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="textFile">Upload PDF, DOC, or DOCX:</label>
                <input type="file" id="textFile" name="file" accept=".pdf,.doc,.docx,.txt" required>
            </div>
            <button type="submit">Convert</button>
        </form>
    </div>

    <div class="card">
        <h2>Sleep Screen / Image Optimizer</h2>
        <form action="/upload-image" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="imgFile">Upload Image (JPG, PNG, etc.):</label>
                <input type="file" id="imgFile" name="file" accept="image/*" required>
            </div>
            <button type="submit">Optimize Image</button>
        </form>
    </div>

</body>
</html>
